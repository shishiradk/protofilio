<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <link rel="stylesheet" href="admin.css" />
  <script src="data.js"></script>
</head>

<body>

  <div class="admin-container">

    <aside class="sidebar">
      <h2>CMS PANEL</h2>
      <ul>
        <li data-tab="hero">Hero / Home</li>
        <li data-tab="hire">Hire Box</li>
        <li data-tab="about">About</li>
        <li data-tab="skills">Skills</li>
        <li data-tab="projects">Projects</li>
        <li data-tab="socials">Socials</li>
        <li data-tab="general">General</li>
      </ul>
    </aside>

    <main class="panel">

      <!-- Hero -->
      <section id="hero" class="tab">
        <h3>Hero / Home</h3>
        <label>Main Title (HTML allowed)</label>
        <input id="hero-title" placeholder="e.g. AI/ML Enthusiast<br>Developer" />

        <label>Description</label>
        <textarea id="hero-desc" placeholder="Hero description"></textarea>

        <label>Image Filename / URL</label>
        <input id="hero-img" placeholder="e.g. AA.png" />

        <label>CV Link</label>
        <input id="hero-cv" placeholder="e.g. ./resume.pdf" />

        <label>Blog Link</label>
        <input id="hero-blog" placeholder="https://..." />

        <button id="save-hero">Save Hero</button>
      </section>

      <!-- Hire -->
      <section id="hire" class="tab">
        <h3>Hire Box</h3>
        <input id="hire-text" placeholder="Hire text" />
        <input id="hire-color" type="color" />
        <label><input type="checkbox" id="hire-visible" /> Visible</label>
        <label><input type="checkbox" id="hire-glow" /> Glow</label>
        <button id="save-hire">Save</button>
      </section>

      <!-- About -->
      <section id="about" class="tab">
        <h3>About Section</h3>
        <label>Section Title</label>
        <input id="about-title" placeholder="Title (e.g. About Me)" />

        <label>Full Name</label>
        <input id="about-name" placeholder="Name" />

        <label>Intro (Top Paragraph)</label>
        <textarea id="about-intro" placeholder="Intro text..."></textarea>

        <label>Main Description (Bottom Paragraph)</label>
        <textarea id="about-desc" placeholder="Main description..."></textarea>

        <!-- Experience Subsection -->
        <hr style="border:1px solid #333; margin: 30px 0;">
        <h4 style="color:var(--accent); margin-bottom:15px;">Experience</h4>

        <input id="exp-role" placeholder="Role (e.g. Intern)" />
        <input id="exp-company" placeholder="Company" />
        <input id="exp-duration" placeholder="Duration (e.g. 2024 - Present)" />
        <textarea id="exp-desc" placeholder="Job Description..."></textarea>

        <button id="add-exp" style="margin-top:10px;">+ Add Experience</button>
        <div id="exp-list" style="margin-top:20px;"></div>

        <button id="save-about" style="margin-top:40px;">Save About & Experience</button>
      </section>

      <!-- Skills -->
      <section id="skills" class="tab">
        <h3>Skills</h3>
        <input id="skill-title" placeholder="Skill title" />
        <input id="skill-icon" placeholder="FontAwesome icon" />
        <input id="skill-desc" placeholder="Description" />
        <button id="add-skill">Add Skill</button>
        <div id="skills-list"></div>
      </section>

      <!-- Projects -->
      <section id="projects" class="tab">
        <h3>Projects</h3>
        <input id="p-title" placeholder="Project name" />
        <input id="p-tags" placeholder="Tags comma separated" />
        <input id="p-demo" placeholder="Demo link" />
        <input id="p-code" placeholder="Code link" />
        <textarea id="p-desc" placeholder="Description"></textarea>
        <label><input type="checkbox" id="p-featured" /> Featured</label>
        <button id="add-project">Add Project</button>
        <div id="projects-list"></div>
      </section>

      <!-- Socials -->
      <section id="socials" class="tab">
        <h3>Social Links</h3>
        <input id="linkedin" placeholder="LinkedIn" />
        <input id="github" placeholder="GitHub" />
        <input id="kaggle" placeholder="Kaggle" />
        <input id="twitter" placeholder="Twitter" />
        <input id="instagram" placeholder="Instagram" />
        <button id="save-socials">Save</button>
      </section>

      <!-- General / Footer -->
      <section id="general" class="tab">
        <h3>General Settings</h3>
        <label>Footer Text</label>
        <input id="footer-text" placeholder="SHISHIRADHIKARI" />
        <label>Footer Year</label>
        <input id="footer-year" placeholder="2025" />
        <button id="save-general">Save General</button>
      </section>

    </main>

  </div>

  <script src="admin.js"></script>
</body>

</html>
